# Smart Render access transformer (Minecraft 1.20.1, official mappings)
#
# ModelRotationRenderer captures the cube geometry of a vanilla ModelPart in order
# to re-parent it into Smart Render's own bone hierarchy. The cube list is private,
# so it is exposed here.
public net.minecraft.client.model.geom.ModelPart cubes

# Smart Render's statistics subsystem drives the vanilla leg-swing animation directly
# (originally EntityPlayer.prevLimbSwingAmount / limbSwingAmount / limbSwing). In 1.20.1
# those values live on LivingEntity.walkAnimation (WalkAnimationState). The fields are
# private, so SmartStatisticsData.apply / SmartStatistics need them exposed.
public net.minecraft.world.entity.WalkAnimationState speedOld
public net.minecraft.world.entity.WalkAnimationState speed
public net.minecraft.world.entity.WalkAnimationState position

public net.minecraft.client.model.PlayerModel slim
public net.minecraft.client.model.PlayerModel cloak
public net.minecraft.client.model.PlayerModel ear
