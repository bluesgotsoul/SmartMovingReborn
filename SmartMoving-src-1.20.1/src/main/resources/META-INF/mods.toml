# Smart Moving - ported to Minecraft 1.20.1 Forge
modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="http://www.minecraftforum.net/topic/361430-"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="http://www.minecraftforum.net/topic/361430-"
authors="${mod_authors}"
credits="_DarKShaM_, Cassiobsk8, Dunncann for translations"
description='''${mod_description}'''

# Smart Moving needs Smart Render to replace the player model/renderer.
[[dependencies.${mod_id}]]
    modId="smartrender"
    mandatory=true
    versionRange="[2.2,)"
    ordering="AFTER"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
